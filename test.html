<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<p id="status">Loading...</p>
<script type="module">
  import { onAuth } from './js/firebase-config.js';
  document.getElementById('status').textContent = 'Firebase loaded';
  onAuth(user => {
    document.getElementById('status').textContent = 
      user ? 'Logged in as: ' + user.email : 'Not logged in — login page should show';
  });
</script>
</body>
</html>
